<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Anime 1996</title>
    <style>
      :root {
        color: #f5ead2;
        background: #0f0b09;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        font-family: 'Oswald', 'Segoe UI', sans-serif;
        color: #f5ead2;
        background:
          radial-gradient(circle at 14% 12%, rgba(240, 182, 96, 0.18), transparent 35rem),
          radial-gradient(circle at 86% 88%, rgba(186, 83, 44, 0.16), transparent 32rem),
          #0f0b09;
      }

      .wrap {
        position: relative;
        display: grid;
        place-items: center;
        width: 100%;
        height: 100%;
        padding: clamp(0.5rem, 2.2vh, 1rem);
      }

      .panel {
        width: min(22rem, calc(100vw - 1rem));
        max-height: calc(100vh - 1rem);
        border: 1px solid rgba(236, 183, 104, 0.35);
        background: rgba(18, 13, 10, 0.88);
        padding: clamp(1rem, 4vh, 1.8rem) clamp(0.9rem, 4vw, 1.6rem);
        text-align: center;
        box-shadow: 0 22px 45px rgba(0, 0, 0, 0.45);
        overflow: auto;
      }

      .logo {
        display: block;
        width: min(11rem, 52vw, 24vh);
        height: auto;
        margin: 0 auto clamp(0.55rem, 2.8vh, 1rem);
        filter: drop-shadow(0 10px 18px rgba(0, 0, 0, 0.42));
      }

      .title {
        margin: clamp(0.45rem, 2.1vh, 0.9rem) 0 0;
        font-size: clamp(1.2rem, 4.3vh, 1.8rem);
        letter-spacing: clamp(0.06em, 0.2vw, 0.12em);
        text-transform: uppercase;
      }

      .desc {
        margin: clamp(0.42rem, 1.9vh, 0.8rem) 0 0;
        font-family: 'Consolas', 'Courier New', monospace;
        font-size: clamp(0.56rem, 1.75vh, 0.7rem);
        letter-spacing: clamp(0.1em, 0.28vw, 0.22em);
        text-transform: uppercase;
        color: rgba(245, 234, 210, 0.78);
      }

      .rail {
        position: relative;
        margin: clamp(0.75rem, 3.2vh, 1.3rem) 0 0;
        width: 100%;
        height: 2px;
        overflow: hidden;
        background: rgba(245, 234, 210, 0.16);
      }

      .rail::before {
        content: '';
        position: absolute;
        inset: 0;
        width: 45%;
        background: rgba(236, 183, 104, 0.9);
        animation: scan 1.35s linear infinite;
      }

      @keyframes scan {
        from {
          transform: translateX(-130%);
        }
        to {
          transform: translateX(330%);
        }
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="panel">
        <img src="/assets/logo.png" alt="My Anime 1996" class="logo" />
        <h1 class="title">Booting Archive</h1>
        <p class="desc">Loading library, playback queue, and plugins</p>
        <div class="rail" aria-hidden="true"></div>
      </section>
    </main>
  </body>
</html>
